<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Askaide GitHub organization banner</title>
  <desc id="desc">Askaide is a Belgian-first multi-country local services marketplace across Belgium, France, Netherlands, Germany, Spain and Morocco.</desc>
  <rect width="1280" height="360" fill="#ffffff"/>
  <circle cx="1120" cy="72" r="150" fill="#eaf3ff"/>
  <circle cx="1210" cy="275" r="190" fill="#fff3e3"/>
  <circle cx="85" cy="310" r="155" fill="#edf7f2"/>
  <g transform="translate(78 66)">
    <text x="0" y="58" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" fill="#12407a">Askaide</text>
    <text x="0" y="108" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="500" fill="#263a54">Belgian-first multi-country local services marketplace</text>
    <text x="0" y="150" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#526174">Home services, trusted local providers and everyday help across selected international markets.</text>

    <text x="0" y="202" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#6a7687">COUNTRIES</text>
    <g transform="translate(0 220)">
      <rect width="118" height="38" rx="19" fill="#e8f1ff"/>
      <text x="22" y="25" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#1e5db8">Belgium</text>
      <rect x="132" width="104" height="38" rx="19" fill="#f4f7fb"/>
      <text x="158" y="25" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#44546a">France</text>
      <rect x="250" width="138" height="38" rx="19" fill="#f4f7fb"/>
      <text x="272" y="25" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#44546a">Netherlands</text>
      <rect x="402" width="116" height="38" rx="19" fill="#f4f7fb"/>
      <text x="426" y="25" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#44546a">Germany</text>
      <rect x="532" width="90" height="38" rx="19" fill="#f4f7fb"/>
      <text x="558" y="25" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#44546a">Spain</text>
      <rect x="636" width="104" height="38" rx="19" fill="#f4f7fb"/>
      <text x="662" y="25" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#44546a">Morocco</text>
    </g>

    <text x="0" y="294" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#6a7687">MAJOR CITIES</text>
    <text x="122" y="294" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#2f3f55">Brussels · Paris · Amsterdam · Berlin · Madrid · Casablanca · Liege · Rotterdam · Barcelona · Rabat</text>
  </g>
  <g transform="translate(958 108)">
    <rect x="0" y="0" width="236" height="144" rx="28" fill="#ffffff" stroke="#d8e4f2" stroke-width="2"/>
    <text x="30" y="48" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#12407a">Local services</text>
    <text x="30" y="82" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#526174">Belgium-first</text>
    <text x="30" y="112" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#526174">International coverage</text>
  </g>
</svg>
